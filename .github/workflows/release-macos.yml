name: macOS Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: Build and package macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version from VERSION file
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          if [[ -z "$VERSION" ]]; then
            echo "VERSION file is empty"
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "Tag/version mismatch: tag=$TAG_VERSION VERSION=$VERSION"
              exit 1
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version from VERSION: $VERSION"

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        shell: bash
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          swift build -c release --product CaptureApp

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/release
          cp .build/release/CaptureApp build/release/
          cat > build/release/RELEASE.txt <<EOF
          version=${{ steps.version.outputs.version }}
          ref=${GITHUB_REF_NAME}
          sha=${GITHUB_SHA}
          EOF
          cat build/release/RELEASE.txt
          tar -czf "build/capture-macos-${{ steps.version.outputs.version }}.tar.gz" -C build/release CaptureApp RELEASE.txt

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: capture-macos-${{ steps.version.outputs.version }}
          path: build/capture-macos-${{ steps.version.outputs.version }}.tar.gz
          if-no-files-found: error
