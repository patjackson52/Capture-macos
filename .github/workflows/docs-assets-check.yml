name: Docs and Assets Check

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/check-assets-manifest.py'
      - 'scripts/preflight-macos-distribution.sh'
      - 'scripts/check-notarized-asset-package.sh'
      - 'assets/**'
      - '.github/workflows/docs-assets-check.yml'
  push:
    branches: [ main, master ]
    paths:
      - 'docs/**'
      - 'scripts/check-assets-manifest.py'
      - 'scripts/preflight-macos-distribution.sh'
      - 'scripts/check-notarized-asset-package.sh'
      - 'assets/**'
      - '.github/workflows/docs-assets-check.yml'

permissions:
  contents: read

jobs:
  docs-assets-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Validate asset manifest scaffolding
        run: scripts/check-assets-manifest.py

      - name: Verify required docs/scripts exist
        run: |
          test -f docs/required-checks.md
          test -f docs/store-assets-readiness.md
          test -f docs/notarized-distribution-asset-package.md
          test -f docs/rollout-evidence-template.md
          test -x scripts/preflight-macos-distribution.sh
          test -x scripts/check-notarized-asset-package.sh
